name: CICD pipeline


on:
  push:
    branches: [main, master]

  schedule:
    - cron : "0 3 * * 1"

  workflow_dispatch:


jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write


    steps:
      - name: Checkout
        uses: action/checkout@v4


      - name: Set-up-python
        uses: action/set-up-python@v5

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Preprocess data
        run: python src/preprocess.py


      - name: Train data
        run: python src/train.py

      - name: Monitor data
        run: python monitor.py


      - name: Build docker image
        run: docker build -t taxi-api

      - name: Log in to GHCR # it is actually github container registry
        uses: docker/login-action@v3 # it stores the docker images in githib
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker tag taxi-api $IMAGE:latest
          docker push $IMAGE:latest


